<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="#2D5A3A">
  <!-- The Wizard - xBPP Gatekeeper -->
  
  <!-- Hat -->
  <path id="hat" d="
    M 180 50 
    Q 200 10, 220 30
    Q 240 60, 230 100
    Q 220 130, 240 140
    L 280 150
    Q 300 155, 290 165
    L 140 180
    Q 120 175, 130 165
    L 170 155
    Q 180 145, 175 130
    Q 165 110, 180 50
    Z
  "/>
  
  <!-- Hat creases -->
  <path id="hat-crease-1" d="M 190 70 Q 210 75, 215 85" stroke="#1a3d26" stroke-width="3" fill="none"/>
  <path id="hat-crease-2" d="M 195 95 Q 215 100, 220 115" stroke="#1a3d26" stroke-width="3" fill="none"/>
  
  <!-- Face profile (negative space cutout effect via lighter fill) -->
  <path id="face" d="
    M 205 160
    L 230 165
    Q 245 168, 250 180
    L 255 200
    Q 250 210, 240 215
    L 235 220
    Q 230 225, 225 220
    L 220 210
    Q 218 205, 220 200
    Z
  " fill="#f5f4f0"/>
  
  <!-- Brow and eye -->
  <path id="brow" d="M 225 175 Q 240 170, 250 178" stroke="#2D5A3A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path id="eye" d="M 235 185 Q 242 188, 245 185" stroke="#2D5A3A" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Mustache -->
  <path id="mustache" d="
    M 220 215
    Q 230 225, 225 240
    Q 222 250, 215 245
    Q 210 240, 212 230
    Q 215 220, 220 215
    Z
  "/>
  
  <!-- Beard - multiple tapered strands -->
  <g id="beard">
    <path d="M 200 235 Q 205 280, 195 340 Q 192 360, 185 380 L 188 380 Q 200 350, 205 300 Q 210 260, 200 235 Z"/>
    <path d="M 210 240 Q 215 290, 210 350 Q 207 380, 200 410 L 204 410 Q 215 370, 218 320 Q 222 270, 210 240 Z"/>
    <path d="M 195 238 Q 198 280, 188 330 Q 183 360, 175 390 L 179 390 Q 192 355, 195 310 Q 200 265, 195 238 Z"/>
    <path d="M 188 240 Q 185 290, 175 340 Q 168 375, 160 400 L 165 400 Q 178 365, 183 320 Q 190 270, 188 240 Z"/>
    <path d="M 218 245 Q 225 300, 222 360 Q 220 400, 215 430 L 220 430 Q 228 390, 230 340 Q 232 280, 218 245 Z"/>
  </g>
  
  <!-- Hair flowing from back of hat -->
  <g id="hair">
    <path d="M 145 175 Q 130 200, 125 250 Q 120 290, 115 320 L 122 318 Q 130 280, 135 240 Q 142 195, 145 175 Z"/>
    <path d="M 155 178 Q 145 210, 140 260 Q 135 300, 130 340 L 138 338 Q 145 295, 150 250 Q 158 200, 155 178 Z"/>
    <path d="M 165 180 Q 158 220, 155 270 Q 150 320, 148 360 L 156 358 Q 162 310, 166 260 Q 172 210, 165 180 Z"/>
  </g>
  
  <!-- Cloak body -->
  <path id="cloak" d="
    M 170 200
    Q 150 220, 130 280
    Q 100 350, 80 420
    Q 60 470, 70 490
    L 280 490
    Q 290 470, 280 440
    Q 265 400, 270 350
    Q 275 300, 260 250
    Q 250 220, 240 200
    Q 230 190, 220 195
    Q 200 200, 170 200
    Z
  "/>
  
  <!-- Right arm and sleeve -->
  <path id="arm" d="
    M 250 220
    Q 280 240, 310 270
    Q 330 290, 340 300
    Q 345 310, 340 320
    Q 330 330, 315 325
    Q 290 315, 270 290
    Q 255 270, 250 250
    Q 248 235, 250 220
    Z
  "/>
  
  <!-- Hand gripping staff -->
  <path id="hand" d="
    M 325 290
    Q 335 285, 345 290
    Q 355 300, 350 315
    Q 345 325, 335 325
    Q 325 322, 320 310
    Q 318 298, 325 290
    Z
  "/>
  
  <!-- Staff handle -->
  <rect id="staff-handle" x="338" y="180" width="8" height="200" rx="2" transform="rotate(25 342 280)"/>
  
  <!-- Staff head - crystal/spear shape -->
  <path id="staff-head" d="
    M 375 130
    L 385 155
    L 380 175
    L 370 175
    L 365 155
    Z
  " transform="rotate(25 375 155)"/>
  
  <!-- Cloak fold details -->
  <path d="M 120 350 Q 140 380, 130 420" stroke="#1a3d26" stroke-width="3" fill="none"/>
  <path d="M 180 400 Q 200 430, 190 470" stroke="#1a3d26" stroke-width="3" fill="none"/>
  
  <!-- Walking leg hint -->
  <path id="leg-front" d="
    M 200 470
    Q 210 485, 220 500
    L 235 500
    Q 225 485, 215 465
    Z
  "/>
  <path id="leg-back" d="
    M 150 475
    Q 140 490, 135 500
    L 155 500
    Q 165 490, 170 475
    Z
  "/>
</svg>
